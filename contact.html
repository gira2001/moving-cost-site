<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | 引越し相場まとめ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      background-color: #f5f7fa;
      color: #333;
      line-height: 1.8;
    }

    header {
      background-color: #2563eb;
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 20px; font-weight: bold; }

    .back-btn {
      background: white;
      color: #2563eb;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }

    .back-btn:hover { background: #eff6ff; }

    main {
      max-width: 680px;
      margin: 40px auto;
      padding: 0 16px;
    }

    .page-title {
      font-size: 24px;
      font-weight: bold;
      color: #1e3a8a;
      margin-bottom: 8px;
    }

    .page-subtitle {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 32px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 20px;
    }

    label {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #374151;
    }

    .required {
      color: #ef4444;
      margin-left: 4px;
      font-size: 12px;
    }

    .optional {
      color: #9ca3af;
      margin-left: 4px;
      font-size: 12px;
      font-weight: normal;
    }

    input[type="text"],
    input[type="email"],
    select,
    textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      color: #333;
      background: #fafafa;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
      background: white;
    }

    textarea {
      resize: vertical;
      min-height: 140px;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s;
      margin-top: 8px;
    }

    .submit-btn:hover { background-color: #1d4ed8; }
    .submit-btn:disabled { background-color: #93c5fd; cursor: not-allowed; }

    .note {
      font-size: 12px;
      color: #9ca3af;
      text-align: center;
      margin-top: 16px;
    }

    /* 送信完了メッセージ */
    .success-message {
      display: none;
      text-align: center;
      padding: 40px 20px;
    }

    .success-message .icon { font-size: 48px; margin-bottom: 16px; }
    .success-message h3 { font-size: 20px; font-weight: bold; color: #16a34a; margin-bottom: 8px; }
    .success-message p { font-size: 14px; color: #6b7280; }

    footer {
      text-align: center;
      padding: 24px 16px;
      font-size: 13px;
      color: #9ca3af;
    }

    footer a { color: #6b7280; margin: 0 12px; }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5581622219211532" crossorigin="anonymous"></script>
</head>
<body>

  <header>
    <div class="header-left">
      <span>🚚</span>
      <h1>引越し相場まとめ</h1>
    </div>
    <a href="index.html" class="back-btn">← トップへ戻る</a>
  </header>

  <main>
    <h2 class="page-title">お問い合わせ</h2>
    <p class="page-subtitle">ご質問・ご意見・不適切な投稿の報告などはこちらからお送りください。</p>

    <div class="card">

      <!-- フォーム -->
      <form id="contactForm" action="https://formspree.io/f/xnjwldwv" method="POST">

        <div class="form-group">
          <label>お名前<span class="optional">任意</span></label>
          <input type="text" name="name" placeholder="例: 山田太郎">
        </div>

        <div class="form-group">
          <label>メールアドレス<span class="required">*必須</span></label>
          <input type="email" name="email" placeholder="例: example@mail.com" required>
        </div>

        <div class="form-group">
          <label>お問い合わせの種類<span class="required">*必須</span></label>
          <select name="category" required>
            <option value="">選択してください</option>
            <option value="不適切な投稿の報告">不適切な投稿の報告</option>
            <option value="サービスに関する質問">サービスに関する質問</option>
            <option value="不具合・エラーの報告">不具合・エラーの報告</option>
            <option value="ご意見・ご要望">ご意見・ご要望</option>
            <option value="その他">その他</option>
          </select>
        </div>

        <div class="form-group">
          <label>お問い合わせ内容<span class="required">*必須</span></label>
          <textarea name="message" placeholder="お問い合わせ内容をご記入ください。" required></textarea>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">送信する</button>
        <p class="note">通常2〜3営業日以内にご返答いたします</p>

      </form>

      <!-- 送信完了メッセージ -->
      <div class="success-message" id="successMessage">
        <div class="icon">✅</div>
        <h3>送信完了しました</h3>
        <p>お問い合わせありがとうございます。<br>内容を確認の上、ご返答いたします。</p>
      </div>

    </div>
  </main>

  <footer>
    <a href="privacy.html">プライバシーポリシー</a>
    <a href="contact.html">お問い合わせ</a>
    <p style="margin-top:8px;">© 2026 引越し相場まとめ</p>
  </footer>

  <script>
    document.getElementById('contactForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = '送信中...';

      const form = e.target;
      const data = new FormData(form);

      try {
        const res = await fetch(form.action, {
          method: 'POST',
          body: data,
          headers: { 'Accept': 'application/json' }
        });

        if (res.ok) {
          form.style.display = 'none';
          document.getElementById('successMessage').style.display = 'block';
        } else {
          throw new Error('送信失敗');
        }
      } catch {
        alert('送信に失敗しました。時間をおいて再度お試しください。');
        btn.disabled = false;
        btn.textContent = '送信する';
      }
    });
  </script>

</body>
</html>
